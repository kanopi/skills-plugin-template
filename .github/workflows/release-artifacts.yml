name: Release Artifacts

# Attach pre-built .skill files and a full plugin zip to every GitHub
# release so users can install without cloning the repo. The plugin name
# is read from .claude-plugin/plugin.json by the packaging scripts — no
# per-repo edits needed here.
#
# Triggers on release publish (automatic for new releases) and
# workflow_dispatch (manual, to retroactively attach artifacts to an
# existing release).
#
# The job checks out the default branch (where the packaging scripts
# live) rather than the target tag, then passes the tag to
# package-plugin.sh so the plugin zip is faithful to that tagged
# revision. The skills zip is packaged from the default branch's
# working tree — when retroactively attaching to old tags this may
# pick up newer skill content; for the current release it's identical.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v1.2.1)'
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          # Full history so `git archive <tag>` resolves any past ref.
          fetch-depth: 0

      - name: Determine target tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package the full plugin
        # Archive the target tag's tree, not the workflow's working tree,
        # so the plugin zip is exactly what shipped at that release.
        run: bash scripts/package-plugin.sh "${{ steps.tag.outputs.value }}"

      - name: Package individual skills (.skill files + bundle)
        run: bash scripts/package-skills.sh

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          echo "Attaching artifacts to release: $TAG"

          # Full plugin zip (for Claude Desktop's "Add plugin" UI)
          gh release upload "$TAG" "dist/${PLUGIN_NAME}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          # Individual .skill files (for Chat / CoWork skill upload)
          for f in dist/skills/*.skill; do
            gh release upload "$TAG" "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

          # All-skills bundle
          gh release upload "$TAG" "dist/${PLUGIN_NAME}-skills.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
